name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      # ✅ Checkout con versión más reciente
      - name: Checkout
        uses: actions/checkout@v4.2.0
        with:
          submodules: true
          lfs: false
          fetch-depth: 0

      # ✅ Setup Node.js 20 (compatible con futuros cambios)
      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      # ✅ Instalar dependencias
      - name: Instalar dependencias
        run: npm ci --prefer-offline --no-audit

      # ✅ Lint (opcional)
      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      # ✅ Tests (opcional)
      - name: Tests
        run: npm test --if-present -- --coverage --watchAll=false --passWithNoTests
        continue-on-error: true

      # ✅ Build de producción
      - name: Build
        run: npm run build --if-present
        env:
          CI: true
          NODE_ENV: production

      # ✅ Deploy a Azure Static Web Apps
      - name: Deploy a Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_DESERT_0BCBBD81E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "build"

      # ✅ Logs de éxito
      - name: ✅ Deploy Exitoso
        if: success()
        run: |
          echo "=========================================="
          echo "✅ Deploy completado exitosamente"
          echo "=========================================="
          echo "URL: ${{ steps.builddeploy.outputs.static_web_app_url }}"
          echo "Rama: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "=========================================="

      # ⚠️ Logs de error
      - name: ❌ Deploy Falló
        if: failure()
        run: |
          echo "=========================================="
          echo "❌ El deploy falló"
          echo "=========================================="
          echo "Repositorio: ${{ github.repository }}"
          echo "Rama: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=========================================="

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_DESERT_0BCBBD81E }}
          action: "close"

      - name: ✅ Environment cerrado
        run: echo "✅ Preview environment eliminado para PR #${{ github.event.pull_request.number }}"
